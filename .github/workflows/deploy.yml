name: CD — Deploy to Local (Self-hosted Runner)

# ── 트리거 ────────────────────────────────────────────────────
# 1) CI 워크플로우가 main/master push에서 성공적으로 완료된 직후 자동 실행
# 2) Actions 탭에서 수동 트리거도 가능 (workflow_dispatch)
on:
  workflow_run:
    workflows:
      - "CI — Build & Push Docker Image"
    types:
      - completed
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      image_tag:
        description: '배포할 이미지 태그 (기본값: latest)'
        required: false
        default: 'latest'

# ── 공통 환경 변수 ────────────────────────────────────────────
env:
  IMAGE_NAME:      covid-variant-tracker
  CONTAINER_NAME:  covid-variant-tracker
  HOST_PORT:       8000
  CONTAINER_PORT:  8000

jobs:
  check-ci-result:
    name: Check CI result
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Abort if CI failed
        if: github.event.workflow_run.conclusion != 'success'
        run: |
          echo "⛔ CI workflow 가 성공하지 못했습니다 (conclusion=${{ github.event.workflow_run.conclusion }})."
          echo "배포를 중단합니다."
          exit 1

  deploy:
    name: Pull & Run on Local Machine
    # Windows self-hosted 환경
    runs-on: self-hosted

    needs: []
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Resolve image tag
        id: tag
        shell: powershell
        run: |
          $eventName = "${{ github.event_name }}"
          if ($eventName -eq "workflow_dispatch") {
            $TAG = "${{ github.event.inputs.image_tag }}"
          } else {
            $REF = "${{ github.event.workflow_run.head_branch }}"
            if ($REF -eq "main" -or $REF -eq "master") {
              $TAG = "latest"
            } else {
              $TAG = $REF
            }
          }
          $IMAGE = "${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:$TAG"
          echo "tag=$TAG" >> $env:GITHUB_OUTPUT
          echo "image=$IMAGE" >> $env:GITHUB_OUTPUT
          Write-Host "▶ 배포 이미지: $IMAGE"

      - name: Log in to Docker Hub
        shell: powershell
        run: |
          "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          Write-Host "✅ Docker Hub 로그인 완료"

      - name: Pull latest image
        shell: powershell
        run: |
          $IMAGE = "${{ steps.tag.outputs.image }}"
          Write-Host "⬇ Pulling $IMAGE ..."
          docker pull $IMAGE
          Write-Host "✅ Pull 완료"

      - name: Stop & remove existing container
        shell: powershell
        run: |
          $NAME = "${{ env.CONTAINER_NAME }}"
          $exists = docker ps -a --format '{{.Names}}' | Select-String -Pattern "^$NAME$"
          if ($exists) {
            Write-Host "⏹ 기존 컨테이너 중지 및 제거: $NAME"
            docker stop $NAME | Out-Null
            docker rm $NAME | Out-Null
            Write-Host "✅ 기존 컨테이너 제거 완료"
          } else {
            Write-Host "ℹ 실행 중인 컨테이너 없음 — 신규 배포로 진행"
          }

      - name: Start new container
        shell: powershell
        run: |
          $IMAGE = "${{ steps.tag.outputs.image }}"
          $NAME = "${{ env.CONTAINER_NAME }}"

          docker run -d `
            --name $NAME `
            --restart unless-stopped `
            -p "${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }}" `
            --label "deployed-by=github-actions" `
            --label "commit=${{ github.sha }}" `
            $IMAGE

          Write-Host "✅ 새 컨테이너 시작 완료"
          Write-Host "🌐 서비스 주소: http://localhost:${{ env.HOST_PORT }}"

      - name: Health check
        shell: powershell
        run: |
          Write-Host "⏳ 헬스체크 대기 (최대 30초)..."
          $success = $false
          for ($i = 1; $i -le 10; $i++) {
            $STATUS = try { docker inspect --format='{{.State.Health.Status}}' "${{ env.CONTAINER_NAME }}" 2>$null } catch { "unknown" }
            if ([string]::IsNullOrWhiteSpace($STATUS)) { $STATUS = "unknown" }
            
            $HTTP = try { (Invoke-WebRequest -Uri "http://localhost:${{ env.HOST_PORT }}/health" -UseBasicParsing -ErrorAction Stop).StatusCode } catch { "000" }

            Write-Host "  시도 $i/10 | Health=$STATUS | HTTP=$HTTP"

            if ($HTTP -eq 200) {
              Write-Host "✅ 서비스 정상 응답 (HTTP 200)"
              $success = $true
              break
            }

            if ($i -eq 10) {
              Write-Host "❌ 헬스체크 실패 — 컨테이너 로그:"
              docker logs "${{ env.CONTAINER_NAME }}" --tail 40
              exit 1
            }

            Start-Sleep -Seconds 3
          }
          if (-not $success) { exit 1 }

      - name: Prune dangling images
        if: always()
        shell: powershell
        run: |
          docker image prune -f
          Write-Host "🧹 사용하지 않는 이미지 정리 완료"

      - name: Log out from Docker Hub
        if: always()
        shell: powershell
        run: docker logout
